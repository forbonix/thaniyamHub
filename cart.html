<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | ThaniyamHub</title>
    <meta name="description" content="Review your selected millets and checkout at ThaniyamHub.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .cart-container {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .cart-container {
                grid-template-columns: 1fr;
            }
        }

        .cart-item {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            padding: 1.5rem;
            background: white;
            border-radius: var(--border-radius-md);
            border: 1px solid var(--border-color);
            margin-bottom: 1rem;
        }

        .cart-item img {
            width: 100px;
            height: 100px;
            object-fit: cover;
            border-radius: var(--border-radius-sm);
        }

        .cart-item-details {
            flex-grow: 1;
        }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .qty-btn {
            background: var(--bg-color);
            border: 1px solid var(--border-color);
            width: 32px;
            height: 32px;
            border-radius: var(--border-radius-sm);
            cursor: pointer;
            transition: var(--transition-fast);
        }

        .qty-btn:hover {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        .order-summary {
            background: white;
            padding: 2rem;
            border-radius: var(--border-radius-lg);
            border: 1px solid var(--border-color);
            position: sticky;
            top: 100px;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1rem;
            font-size: 1.1rem;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-seedling"></i> ThaniyamHub
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="products.html">Shop Millets</a>
                <a href="cart.html" style="color: var(--primary-color); position: relative;">
                    <i class="fa-solid fa-cart-shopping"></i> Cart
                    <span id="cart-count"
                        style="display: none; position: absolute; top: -8px; right: -12px; background: var(--error); color: white; border-radius: 50%; padding: 2px 6px; font-size: 0.7rem; font-weight: bold;">0</span>
                </a>
                <div id="auth-links" style="display: flex; align-items: center; gap: 1rem;"></div>
            </div>
        </div>
    </nav>

    <main class="container">
        <h1 style="font-size: 2.5rem; margin-bottom: 2rem;" class="animate-fade-in">Your Shopping Cart</h1>

        <div class="cart-container animate-fade-in">
            <div id="cart-items-container">
                <!-- Cart items injected here -->
            </div>

            <div class="order-summary">
                <h3
                    style="font-size: 1.5rem; margin-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem;">
                    Order Summary</h3>
                <div class="summary-row">
                    <span>Subtotal</span>
                    <span id="summary-subtotal">₹0.00</span>
                </div>
                <div class="summary-row">
                    <span>Shipping</span>
                    <span>Free</span>
                </div>
                <div class="summary-row"
                    style="font-weight: 700; font-size: 1.5rem; border-top: 1px solid var(--border-color); padding-top: 1rem; margin-top: 1rem;">
                    <span>Total</span>
                    <span id="summary-total">₹0.00</span>
                </div>
                <button id="checkout-btn" class="btn btn-primary"
                    style="width: 100%; margin-top: 2rem; font-size: 1.1rem;">
                    Proceed to Checkout
                </button>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderCart();
            window.addEventListener('cartUpdated', renderCart);

            document.getElementById('checkout-btn').addEventListener('click', async () => {
                const user = Auth.getUser();
                if (!user) {
                    showToast('Please login to checkout', 'error');
                    setTimeout(() => {
                        window.location.href = 'login.html?redirect=cart.html';
                    }, 1500);
                    return;
                }

                const cart = Cart.getItems();
                if (cart.length === 0) {
                    showToast('Your cart is empty!', 'error');
                    return;
                }

                const orderData = {
                    user_id: user.id,
                    total_amount: Cart.getTotal(),
                    items: cart.map(item => ({
                        product_id: item.id,
                        quantity: item.cartQuantity,
                        price: item.price
                    }))
                };

                try {
                    const response = await fetch(`${API_BASE}/orders.php`, {
                        method: 'POST',
                        body: JSON.stringify(orderData),
                        headers: {
                            'Content-Type': 'application/json'
                        }
                    });

                    const result = await response.json();
                    if (result.status === 'success') {
                        Cart.clear();
                        showToast('Order placed successfully! Order ID: ' + result.order_id);
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 2000);
                    } else {
                        showToast(result.message, 'error');
                    }
                } catch (err) {
                    showToast('Failed to connect to checkout API', 'error');
                }
            });
        });

        function renderCart() {
            const container = document.getElementById('cart-items-container');
            const cart = Cart.getItems();

            if (cart.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 4rem; background: white; border-radius: var(--border-radius-md); border: 1px solid var(--border-color);">
                        <i class="fa-solid fa-cart-arrow-down" style="font-size: 4rem; color: var(--border-color); margin-bottom: 1rem;"></i>
                        <h3 style="font-size: 1.5rem; margin-bottom: 1rem;">Your cart is empty</h3>
                        <a href="products.html" class="btn btn-primary">Start Shopping</a>
                    </div>
                `;
            } else {
                let html = '';
                cart.forEach(item => {
                    html += `
                        <div class="cart-item">
                            <img src="https://placehold.co/400x400/e8f5e9/2F9E44?text=${encodeURIComponent(item.name)}" alt="${item.name}">
                            <div class="cart-item-details">
                                <h4 style="font-size: 1.25rem; margin-bottom: 0.5rem;">${item.name}</h4>
                                <div style="color: var(--primary-color); font-weight: 700; font-size: 1.1rem; margin-bottom: 1rem;">₹${item.price}</div>
                                <div class="qty-control">
                                    <button class="qty-btn" onclick="updateQty(${item.id}, ${item.cartQuantity - 1})"><i class="fa-solid fa-minus"></i></button>
                                    <span style="width: 30px; text-align: center; font-weight: 600;">${item.cartQuantity}</span>
                                    <button class="qty-btn" onclick="updateQty(${item.id}, ${item.cartQuantity + 1})"><i class="fa-solid fa-plus"></i></button>
                                    <button class="btn btn-secondary" style="padding: 0.25rem 0.5rem; margin-left: auto; color: var(--error);" onclick="removeItem(${item.id})">
                                        <i class="fa-solid fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                container.innerHTML = html;
            }

            const total = Cart.getTotal();
            document.getElementById('summary-subtotal').textContent = `₹${total.toFixed(2)}`;
            document.getElementById('summary-total').textContent = `₹${total.toFixed(2)}`;
        }

        function updateQty(id, qty) {
            Cart.updateQuantity(id, qty);
        }

        function removeItem(id) {
            Cart.removeItem(id);
        }
    </script>
</body>

</html>
