<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop Millets | ThaniyamHub</title>
    <meta name="description"
        content="Browse our organic millets collection. Buy premium bajra, ragi, and more online at ThaniyamHub.">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-seedling"></i> ThaniyamHub
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a href="products.html" style="color: var(--primary-color);">Shop Millets</a>
                <a href="cart.html" style="position: relative;">
                    <i class="fa-solid fa-cart-shopping"></i> Cart
                    <span id="cart-count"
                        style="display: none; position: absolute; top: -8px; right: -12px; background: var(--error); color: white; border-radius: 50%; padding: 2px 6px; font-size: 0.7rem; font-weight: bold;">0</span>
                </a>
                <div id="auth-links" style="display: flex; align-items: center; gap: 1rem;"></div>
            </div>
        </div>
    </nav>

    <main class="container">
        <div style="margin-bottom: 2rem;" class="animate-fade-in">
            <h1 style="font-size: 3rem; margin-bottom: 1rem;">Our Preimum Millets</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">Freshly harvested organic millets directly to your
                doorstep.</p>
        </div>

        <div id="loading" style="text-align: center; padding: 4rem; color: var(--text-muted);">
            <i class="fa-solid fa-circle-notch fa-spin fa-3x"></i>
            <p style="margin-top: 1rem;">Loading products...</p>
        </div>

        <div id="product-grid" class="product-grid animate-fade-in" style="display: none;">
            <!-- Products will be injected here via JS -->
        </div>
    </main>

    <script src="js/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const grid = document.getElementById('product-grid');
            const loading = document.getElementById('loading');

            try {
                const response = await fetch(`${API_BASE}/products.php`);
                const result = await response.json();

                if (result.status === 'success') {
                    loading.style.display = 'none';
                    grid.style.display = 'grid';

                    result.data.forEach(product => {
                        const card = document.createElement('div');
                        card.className = 'product-card';

                        // Using a placeholder image if custom isn't found using https://placehold.co
                        card.innerHTML = `
                            <img src="https://placehold.co/400x400/e8f5e9/2F9E44?text=${encodeURIComponent(product.name)}" alt="${product.name}" class="product-image">
                            <span class="product-category">${product.category}</span>
                            <h3 class="product-title">${product.name}</h3>
                            <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1rem; flex-grow: 1;">${product.description.substring(0, 80)}...</p>
                            <div class="product-price">₹${product.price}</div>
                            <button class="btn btn-primary" onclick='addToCart(${JSON.stringify(product)})'>
                                <i class="fa-solid fa-cart-plus"></i> Add to Cart
                            </button>
                        `;
                        grid.appendChild(card);
                    });
                }
            } catch (error) {
                loading.innerHTML = `<p style="color: var(--error);"><i class="fa-solid fa-triangle-exclamation"></i> Failed to load products. Please ensure the backend is running.</p>`;
                console.error("Error loading products:", error);
            }
        });

        function addToCart(product) {
            Cart.addItem(product);
        }
    </script>
</body>

</html>
